gateway:
  host: 127.0.0.1
  port: 18800
  heartbeat_interval_s: 5
  heartbeat_timeout_count: 3

services:
  - name: scheduler
    plugins:
      - libflowsql_scheduler.so
      - libflowsql_bridge.so

      # 测试 MySQL 驱动
      - name: libflowsql_database.so
        databases:
          # SQLite 测试数据库
          - type: sqlite
            name: testdb
            path: ":memory:"

          # MySQL 测试数据库
          - type: mysql
            name: mysqldb
            host: localhost
            port: 3306
            user: root
            password: "flowSQL@mysql"
            database: flowsql_db
            charset: utf8mb4
            timeout: 10
    port: 18803

  - name: pyworker
    type: python
    command: "python3 -m flowsql.worker"
    port: 18900
