version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: flowsql-clickhouse
    restart: always
    environment:
      # 仅用于首次初始化时建库；用户由 users.d/custom.xml 管理
      CLICKHOUSE_DB: flowsql_db
    ports:
      - "8123:8123"   # HTTP 接口
      - "9000:9000"   # Native TCP 接口
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
      # 覆盖容器自动生成的 default-user.xml，防止 flowsql_user profile 被篡改
      - ./clickhouse/default-user.xml:/etc/clickhouse-server/users.d/default-user.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  clickhouse_data:
  clickhouse_logs:
